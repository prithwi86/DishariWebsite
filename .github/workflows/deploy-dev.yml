name: Deploy to Dev

on:
  # Auto-deploy on push to dev branch
  push:
    branches: [dev]
  # Manual trigger (for Cloudinary content updates without code changes)
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Cloudinary + Build
        run: npm run build:sync
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_ALLOWED_DOMAIN: ${{ secrets.VITE_ALLOWED_DOMAIN }}

      - name: Inject Cloudinary credentials into .htaccess
        run: |
          HTACCESS="./dist/.htaccess"
          ORIGINAL=$(cat "$HTACCESS")
          {
            echo "# Cloudinary credentials (injected by CI)"
            echo "SetEnv CLOUDINARY_CLOUD_NAME ${{ secrets.CLOUDINARY_CLOUD_NAME }}"
            echo "SetEnv CLOUDINARY_API_KEY ${{ secrets.CLOUDINARY_API_KEY }}"
            echo "SetEnv CLOUDINARY_API_SECRET ${{ secrets.CLOUDINARY_API_SECRET }}"
            echo ""
            echo "$ORIGINAL"
          } > "$HTACCESS"

      - name: Deploy to Hostinger (Dev)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DEV_FTP_HOST }}
          username: ${{ secrets.DEV_FTP_USERNAME }}
          password: ${{ secrets.DEV_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          dangerous-clean-slate: true
